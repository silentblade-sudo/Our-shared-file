<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Архив «Черный Лес» | Система учёта фигурантов</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0c0b;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      min-height: 100vh;
      color: #d1d5db;
      background-image: radial-gradient(rgba(30, 40, 35, 0.7) 1px, transparent 1px);
      background-size: 40px 40px;
      display: flex;
      flex-direction: column;
    }
    .app-container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: rgba(16, 20, 18, 0.95);
      backdrop-filter: blur(18px);
      border: 1px solid #2a3a2f;
      border-radius: 1rem;
      padding: 0.8rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    nav .logo {
      font-size: 1.4rem;
      font-weight: 600;
      color: #cfdfc7;
    }
    button, .btn {
      background: #2d382a;
      border: 1px solid #5a6e50;
      color: #dce5d5;
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
    }
    button:hover, .btn:hover {
      background: #3f4f38;
      border-color: #8baa7a;
      box-shadow: 0 0 12px #2b3b24;
    }
    .btn-cancel {
      background: #3a2e2e;
      border-color: #6e4a4a;
      color: #e0c0c0;
    }
    .btn-cancel:hover {
      background: #4f3535;
      border-color: #9a5a5a;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(16, 20, 18, 0.9);
      border-radius: 1rem;
      overflow: hidden;
    }
    th {
      text-align: left;
      padding: 0.8rem;
      background: #1e2a1e;
      color: #b9ccb0;
    }
    td {
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid #2a3727;
    }
    .status-badge {
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
      display: inline-block;
    }
    .dossier-container {
      background: rgba(16, 20, 18, 0.9);
      backdrop-filter: blur(18px);
      border: 1px solid #2a3a2f;
      border-radius: 1.5rem;
      padding: 1.8rem;
    }
    .flex-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }
    .field label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8b9e82;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      background: #131a15;
      border: 1px solid #344231;
      border-radius: 0.5rem;
      padding: 0.6rem 0.8rem;
      color: #e5e7e0;
      font-size: 0.95rem;
      outline: none;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: #6d8b5e;
      box-shadow: 0 0 8px rgba(100, 140, 90, 0.4);
    }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #2e4d2e;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      z-index: 2000;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
      border: 1px solid #5a8a4a;
    }
    .status-filter-wrap { position: relative; }
    .status-filter-panel {
      display: none;
      position: absolute;
      top: 115%;
      right: 0;
      background: #131a15;
      border: 1px solid #344231;
      border-radius: 0.7rem;
      padding: 0.8rem 1rem;
      z-index: 50;
      min-width: 220px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .status-filter-panel label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .status-filter-panel.open { display: block; }
    .sort-select {
      background: #1a1f1c;
      color: white;
      border: 1px solid #3a4a34;
      padding: 0.5rem;
      border-radius: 0.5rem;
    }
    .history-log {
      background: #10150f;
      border: 1px solid #2a3727;
      border-radius: 0.6rem;
      padding: 0.6rem 0.8rem;
      max-height: 160px;
      overflow-y: auto;
      font-size: 0.82rem;
    }
    .history-log .entry {
      padding: 0.3rem 0;
      border-bottom: 1px dashed #2a3727;
      color: #a9bba0;
    }
    .history-log .entry:last-child { border-bottom: none; }
    .history-log .entry .who {
      color: #cfdfc7;
      font-weight: 600;
    }
    @media print {
  /* Скрываем всё, кроме нужного нам элемента */
  body * { 
    visibility: hidden; 
  }
  
  /* Делаем видимым только контейнер для печати */
  #printArea, #printArea * { 
    visibility: visible; 
  }
  
  /* Позиционируем его в начале страницы */
  #printArea { 
    position: absolute; 
    left: 0; 
    top: 0; 
    width: 100%;
    display: block !important; /* Убедимся, что он не скрыт через display: none */
  }
}
  </style>
</head>
<body>
<div id="app" class="app-container">
  <!-- Динамический контент -->
</div>
<div id="printArea" style="display:none;"></div>

<script>
  // ===================== FIREBASE КОНФИГУРАЦИЯ =====================
  const firebaseConfig = {
    apiKey: "AIzaSyBpeVvCL3_0i1aGz29MJUzgB7zZ0kSP3r8",
  authDomain: "our-shared-file.firebaseapp.com",
  projectId: "our-shared-file",
  storageBucket: "our-shared-file.firebasestorage.app",
  messagingSenderId: "125441513590",
  appId: "1:125441513590:web:b176b30544734945376757",
  measurementId: "G-LT9VQ6JP6R"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const storage = firebase.storage();

  // ===================== КОНСТАНТЫ =====================
  const STATUSES = ['Член Стаи','Информатор','Свидетель','Подозреваемый','Культист','Враг / Прокси'];
  const STATUS_COLORS = {
    'Член Стаи': '#2e7d32', 'Информатор': '#1565c0', 'Свидетель': '#f9a825',
    'Подозреваемый': '#ef6c00', 'Культист': '#7b1fa2', 'Враг / Прокси': '#c62828'
  };

  // ===================== ГЛОБАЛЬНОЕ СОСТОЯНИЕ =====================
  const state = {
    currentRoute: 'list',
    editId: null,
    allPersons: [],
    selectedStatuses: [],
    sortBy: 'lastEdited_desc',
    editorName: ''
  };

  // ===================== ИМЯ РЕДАКТОРА (для истории изменений) =====================
  function getEditorName() {
    if (!state.editorName) {
      const name = window.prompt('Введите ваше имя/псевдоним для истории изменений досье:', '');
      state.editorName = (name && name.trim()) ? name.trim() : 'Неизвестный';
    }
    return state.editorName;
  }

  // ===================== ВСПЛЫВАЮЩИЕ УВЕДОМЛЕНИЯ =====================
  function showToast(message, duration = 2000) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), duration);
  }

  // ===================== ЗАГРУЗКА ДАННЫХ ИЗ FIREBASE =====================
  function loadAndDisplayPersons() {
    db.ref('persons').on('value', snapshot => {
      const data = snapshot.val() || {};
      state.allPersons = Object.entries(data).map(([id, val]) => ({ id, ...val }));
      filterPersons();
    });
  }

  // ===================== СОХРАНЕНИЕ ДАННЫХ В FIREBASE =====================
  async function savePersonToFirebase(id) {
    const now = new Date().toISOString().slice(0,16).replace('T',' ');
    const editor = getEditorName();
    const data = {
      alias: document.getElementById('alias').value,
      realName: document.getElementById('realName').value,
      birthAge: document.getElementById('birthAge').value,
      location: document.getElementById('locationText').value,
      telegram: document.getElementById('telegram').value,
      whatsapp: document.getElementById('whatsapp').value,
      status: document.getElementById('status').value,
      trust: parseInt(document.getElementById('trust').value),
      history: document.getElementById('history').value,
      symptoms: [...document.querySelectorAll('.symptom:checked')].map(c=>c.value),
      extraSymptoms: document.getElementById('extraSymptoms').value,
      connections: document.getElementById('connections').value,
      testimony: document.getElementById('testimony').value,
      architectNotes: document.getElementById('architectNotes')?.value || '',
      photoURL: document.getElementById('photoContainer').dataset.photoURL || document.getElementById('photoContainer').querySelector('img')?.src || '',
      lastEdited: now
    };

    if (!id) {
      data.created = now;
      data.editLog = [{ who: editor, when: now, action: 'Создано досье' }];
      await db.ref('persons').push(data);
    } else {
      const existing = state.allPersons.find(p => p.id === id);
      const prevLog = Array.isArray(existing?.editLog) ? existing.editLog : [];
      data.editLog = [...prevLog, { who: editor, when: now, action: 'Изменено досье' }];
      await db.ref('persons/' + id).update(data);
    }

    showToast('✅ Запись сохранена');
    state.currentRoute = 'list';
    renderRoute();
  }

  // ===================== УДАЛЕНИЕ ЗАПИСИ ИЗ FIREBASE =====================
  async function deletePersonFromFirebase(id) {
    if (!confirm('Удалить запись навсегда?')) return;
    await db.ref('persons/' + id).remove();
    state.currentRoute = 'list';
    renderRoute();
  }

  // ===================== РОУТЕР =====================
  function renderRoute() {
    const app = document.getElementById('app');
    switch(state.currentRoute) {
      case 'list': renderListPage(app); break;
      case 'create': renderDossierForm(app, null); break;
      case 'edit': renderDossierForm(app, state.editId); break;
      default: renderListPage(app);
    }
  }

  // ===================== СТРАНИЦА СПИСКА =====================
  function renderListPage(container) {
    container.innerHTML = `
      <nav>
        <span class="logo"><i class="fas fa-tree"></i> Архив «Черный Лес»</span>
      </nav>
      <div class="flex-row" style="margin-bottom:1rem;">
        <input type="text" id="searchInput" placeholder="Поиск по имени..." style="flex:1; background:#1a1f1c; border:1px solid #3a4a34; padding:0.5rem; border-radius:0.5rem; color:white;" />
        <div class="status-filter-wrap">
          <button type="button" id="statusFilterBtn"><i class="fas fa-filter"></i> Статусы<span id="statusFilterCount"></span></button>
          <div class="status-filter-panel" id="statusFilterPanel">
            ${STATUSES.map(s => `
              <label>
                <input type="checkbox" class="statusFilterChk" value="${s}" ${state.selectedStatuses.includes(s) ? 'checked' : ''}>
                <span class="status-badge" style="background:${STATUS_COLORS[s]};">${s}</span>
              </label>
            `).join('')}
            <button type="button" id="statusFilterClear" style="width:100%; justify-content:center; margin-top:0.3rem;">Сбросить всё</button>
          </div>
        </div>
        <select id="sortSelect" class="sort-select">
          <option value="lastEdited_desc">Сначала недавно изменённые</option>
          <option value="lastEdited_asc">Сначала давно изменённые</option>
          <option value="alias_asc">Имя А→Я</option>
          <option value="alias_desc">Имя Я→А</option>
          <option value="trust_desc">Доверие: высокое→низкое</option>
          <option value="trust_asc">Доверие: низкое→высокое</option>
        </select>
        <button onclick="state.currentRoute='create'; renderRoute();"><i class="fas fa-plus"></i> Добавить</button>
        <button onclick="exportToPrint()"><i class="fas fa-print"></i> Печать</button>
      </div>
      <div id="personsTable"></div>
    `;
    loadAndDisplayPersons();
    document.getElementById('searchInput').addEventListener('input', filterPersons);

    const sortSelect = document.getElementById('sortSelect');
    sortSelect.value = state.sortBy;
    sortSelect.addEventListener('change', (e) => { state.sortBy = e.target.value; filterPersons(); });

    const filterBtn = document.getElementById('statusFilterBtn');
    const filterPanel = document.getElementById('statusFilterPanel');
    filterBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      filterPanel.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (!filterPanel.contains(e.target) && e.target !== filterBtn) {
        filterPanel.classList.remove('open');
      }
    }, { once: true });

    document.querySelectorAll('.statusFilterChk').forEach(chk => {
      chk.addEventListener('change', () => {
        state.selectedStatuses = [...document.querySelectorAll('.statusFilterChk:checked')].map(c => c.value);
        updateStatusFilterCount();
        filterPersons();
      });
    });
    document.getElementById('statusFilterClear').addEventListener('click', () => {
      state.selectedStatuses = [];
      document.querySelectorAll('.statusFilterChk').forEach(c => c.checked = false);
      updateStatusFilterCount();
      filterPersons();
    });
    updateStatusFilterCount();
  }

  function updateStatusFilterCount() {
    const countEl = document.getElementById('statusFilterCount');
    if (!countEl) return;
    countEl.textContent = state.selectedStatuses.length ? ` (${state.selectedStatuses.length})` : '';
  }

  function filterPersons() {
    const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
    let filtered = state.allPersons;
    if (search) filtered = filtered.filter(p => (p.alias || '').toLowerCase().includes(search));
    if (state.selectedStatuses.length) filtered = filtered.filter(p => state.selectedStatuses.includes(p.status));

    filtered = [...filtered].sort((a, b) => {
      switch (state.sortBy) {
        case 'lastEdited_asc': return (a.lastEdited || '').localeCompare(b.lastEdited || '');
        case 'alias_asc': return (a.alias || '').localeCompare(b.alias || '');
        case 'alias_desc': return (b.alias || '').localeCompare(a.alias || '');
        case 'trust_desc': return (b.trust || 0) - (a.trust || 0);
        case 'trust_asc': return (a.trust || 0) - (b.trust || 0);
        case 'lastEdited_desc':
        default: return (b.lastEdited || '').localeCompare(a.lastEdited || '');
      }
    });

    renderTable(filtered);
  }

  function renderTable(persons) {
    const tbody = document.getElementById('personsTable');
    if (!tbody) return;
    tbody.innerHTML = `
      <table>
        <thead><tr><th>Имя / Псевдоним</th><th>Статус</th><th>Доверие</th><th>Изменён</th></tr></thead>
        <tbody>
          ${persons.map(p => `
            <tr style="cursor:pointer;" onclick="openDossier('${p.id}')">
              <td><i class="fas fa-user-secret"></i> ${p.alias || 'Без имени'}</td>
              <td><span class="status-badge" style="background:${STATUS_COLORS[p.status] || '#555'};">${p.status || '-'}</span></td>
              <td>${'★'.repeat(p.trust || 0)}${'☆'.repeat(5-(p.trust||0))}</td>
              <td>${p.lastEdited || '-'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function openDossier(id) {
    state.editId = id;
    state.currentRoute = 'edit';
    renderRoute();
  }

  // ===================== ЭКСПОРТ В ПЕЧАТЬ (СПИСОК) =====================
  function exportToPrint() {
    const printContent = `
      <h2 style="color:black;">Список фигурантов (Архив «Черный Лес»)</h2>
      <table border="1" cellpadding="8" style="width:100%; border-collapse:collapse; color:black;">
        <thead><tr><th>Имя</th><th>Статус</th><th>Доверие</th><th>Изменён</th></tr></thead>
        <tbody>
          ${state.allPersons.map(p => `
            <tr>
              <td>${p.alias || '-'}</td>
              <td style="background:${STATUS_COLORS[p.status] || '#eee'};">${p.status || '-'}</td>
              <td>${'★'.repeat(p.trust||0)}</td>
              <td>${p.lastEdited || '-'}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    `;
    // Внутри функции printSingleDossier:
document.getElementById('printArea').innerHTML = printContent;
document.getElementById('printArea').style.display = 'block'; // Принудительно включаем
setTimeout(() => {
    window.print();
    document.getElementById('printArea').style.display = 'none'; // Скрываем обратно после печати
}, 500);
  }

  // ===================== ПЕЧАТЬ ОДНОГО ДОСЬЕ =====================
  function printSingleDossier(id) {
    const p = state.allPersons.find(x => x.id === id);
    if (!p) return;
    const log = Array.isArray(p.editLog) ? p.editLog : [];
    const printContent = `
      <div style="color:black; font-family: Arial, sans-serif; max-width:800px;">
        <h2 style="margin-bottom:0.2rem;">Досье: ${p.alias || 'Без имени'}</h2>
        <p style="color:#555; margin-bottom:1rem;">Статус: <b>${p.status || '-'}</b> · Доверие: ${'★'.repeat(p.trust||0)}${'☆'.repeat(5-(p.trust||0))}</p>
        ${p.photoURL ? `<img src="${p.photoURL}" style="width:140px;height:140px;object-fit:cover;border-radius:8px;margin-bottom:1rem;">` : ''}
        <table border="1" cellpadding="6" style="width:100%; border-collapse:collapse; margin-bottom:1rem;">
          <tr><th align="left" style="background:#eee;">Реальное имя</th><td>${p.realName || '-'}</td></tr>
          <tr><th align="left" style="background:#eee;">Дата рождения</th><td>${p.birthAge || '-'}</td></tr>
          <tr><th align="left" style="background:#eee;">Местоположение</th><td>${p.location || '-'}</td></tr>
          <tr><th align="left" style="background:#eee;">Telegram</th><td>${p.telegram || '-'}</td></tr>
          <tr><th align="left" style="background:#eee;">WhatsApp</th><td>${p.whatsapp || '-'}</td></tr>
          <tr><th align="left" style="background:#eee;">Симптомы</th><td>${(p.symptoms||[]).join(', ') || '-'}${p.extraSymptoms ? ' · '+p.extraSymptoms : ''}</td></tr>
          <tr><th align="left" style="background:#eee;">Связи</th><td>${p.connections || '-'}</td></tr>
        </table>
        <h3>История контакта</h3><p>${(p.history || '-').replace(/\n/g,'<br>')}</p>
        <h3>Ключевые показания</h3><p>${(p.testimony || '-').replace(/\n/g,'<br>')}</p>
        <h3>Заметки Архитектора</h3><p>${(p.architectNotes || '-').replace(/\n/g,'<br>')}</p>
        <h3>История изменений досье</h3>
        <table border="1" cellpadding="6" style="width:100%; border-collapse:collapse;">
          <thead><tr><th>Дата</th><th>Кто</th><th>Действие</th></tr></thead>
          <tbody>
            ${log.length ? log.map(e => `<tr><td>${e.when}</td><td>${e.who}</td><td>${e.action}</td></tr>`).join('') : '<tr><td colspan="3">Нет записей</td></tr>'}
          </tbody>
        </table>
      </div>
    `;
    // Внутри функции printSingleDossier:
document.getElementById('printArea').innerHTML = printContent;
document.getElementById('printArea').style.display = 'block'; // Принудительно включаем
setTimeout(() => {
    window.print();
    document.getElementById('printArea').style.display = 'none'; // Скрываем обратно после печати
}, 500);
  }

  // ===================== ФОРМА ДОСЬЕ =====================
  function renderDossierForm(container, id) {
    const isEdit = !!id;
    const person = isEdit ? state.allPersons.find(p => p.id === id) : null;
    container.innerHTML = `
      <nav>
        <button onclick="state.currentRoute='list'; renderRoute();"><i class="fas fa-arrow-left"></i> Назад к списку</button>
        <span class="logo">${isEdit ? 'Редактирование досье' : 'Новое досье'}</span>
        <div class="flex-row">
          ${isEdit ? `<button onclick="printSingleDossier('${id}')"><i class="fas fa-print"></i> Печать досье</button>` : ''}
          ${isEdit ? `<button style="background:#5e3a3a;border-color:#aa4a4a;" onclick="deletePersonFromFirebase('${id}')"><i class="fas fa-trash"></i> Удалить</button>` : ''}
        </div>
      </nav>
      <div class="dossier-container" id="dossierForm"></div>
    `;
    renderFullDossierForm(person, isEdit);
  }

  function renderFullDossierForm(person, isEdit) {
    const formDiv = document.getElementById('dossierForm');
    const log = Array.isArray(person?.editLog) ? person.editLog : [];
    formDiv.innerHTML = `
      <div style="display:flex; gap:1rem; flex-wrap:wrap;">
        <div id="photoContainer" style="width:150px;height:150px;background:#1c231e;border-radius:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer; overflow:hidden;">
          ${person?.photoURL ? `<img src="${person.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:1rem;">` : '<i class="fas fa-camera" style="font-size:2rem;"></i>'}
        </div>
        <input type="file" id="photoInput" accept="image/*" style="display:none;">
        <div class="form-grid" style="flex:1;">
          <div class="field"><label>Псевдоним</label><input id="alias" value="${person?.alias||''}"></div>
          <div class="field"><label>Реальное имя</label><input id="realName" value="${person?.realName||''}"></div>
          <div class="field"><label>Дата рождения</label><input id="birthAge" value="${person?.birthAge||''}"></div>
          <div class="field"><label>Местоположение</label><input id="locationText" value="${person?.location||''}"></div>
          <div class="field">
  <label>Telegram</label>
  <div style="display:flex; gap:0.5rem;">
    <input id="telegram" value="${person?.telegram||''}" style="flex:1;">
    ${person?.telegram ? `<a href="https://t.me/${person.telegram.replace('@', '')}" target="_blank" style="background:#2d382a; border:1px solid #5a6e50; color:#dce5d5; padding:0.5rem 1rem; border-radius:2rem; text-decoration:none; display:inline-flex; align-items:center; gap:0.3rem; font-size:0.9rem;"><i class="fab fa-telegram"></i> Открыть</a>` : ''}
  </div>
</div>
          <div class="field"><label>WhatsApp</label><input id="whatsapp" value="${person?.whatsapp||''}"></div>
        </div>
      </div>
      <div style="margin:1rem 0; display:flex; gap:2rem; flex-wrap:wrap;">
        <div class="field"><label>Статус</label><select id="status">${STATUSES.map(s=>`<option ${person?.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="field"><label>Доверие</label><input type="range" id="trust" min="1" max="5" value="${person?.trust||3}"> <span id="trustVal">${person?.trust||3}/5</span></div>
      </div>
      <div class="field"><label>История контакта</label><textarea id="history" rows="2">${person?.history||''}</textarea></div>
      <div style="margin:0.8rem 0;"><label>Симптомы:</label> ${['Кашель','Кровь','Кошмары','Провалы в памяти','Галлюцинации'].map(s=>`<label style="margin-right:1rem;"><input type="checkbox" class="symptom" value="${s}" ${person?.symptoms?.includes(s)?'checked':''}>${s}</label>`).join(' ')}</div>
      <div class="field"><input id="extraSymptoms" placeholder="Дополнительные симптомы" value="${person?.extraSymptoms||''}"></div>
      <div class="field"><input id="connections" placeholder="Связи с другими фигурантами" value="${person?.connections||''}"></div>
      <div class="field"><label>Ключевые показания</label><textarea id="testimony" rows="2">${person?.testimony||''}</textarea></div>
      <div class="field"><label>Заметки Архитектора</label><textarea id="architectNotes" rows="2">${person?.architectNotes||''}</textarea></div>
      <div class="field" style="margin-top:1rem;">
        <label>Дата добавления</label>
        <input id="createdDate" readonly value="${person?.created || 'будет установлена автоматически'}">
      </div>
      <div class="field">
        <label>Последнее редактирование</label>
        <input id="lastEditedDisplay" readonly value="${person?.lastEdited || 'ещё не сохранено'}">
      </div>
      <div class="field" style="margin-top:1rem;">
        <label>История изменений досье</label>
        <div class="history-log">
          ${log.length ? log.slice().reverse().map(e => `<div class="entry"><span class="who">${e.who}</span> — ${e.when} — ${e.action}</div>`).join('') : '<div class="entry">Пока нет записей</div>'}
        </div>
      </div>
      <div style="display:flex; gap:1rem; margin-top:1.2rem;">
        <button id="saveBtn"><i class="fas fa-save"></i> Сохранить</button>
        <button class="btn-cancel" id="cancelBtn"><i class="fas fa-times"></i> Отмена</button>
      </div>
    `;

    document.getElementById('photoContainer').onclick = ()=> document.getElementById('photoInput').click();
    document.getElementById('photoInput').onchange = handlePhotoUpload;
    document.getElementById('trust').oninput = (e)=> document.getElementById('trustVal').textContent = e.target.value+'/5';
    document.getElementById('saveBtn').onclick = ()=> savePersonToFirebase(isEdit ? person.id : null);
    document.getElementById('cancelBtn').onclick = ()=> { state.currentRoute='list'; renderRoute(); };
  }

  async function handlePhotoUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const ref = storage.ref('photos/' + Date.now() + '_' + file.name);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    document.getElementById('photoContainer').innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:1rem;">`;
    document.getElementById('photoContainer').dataset.photoURL = url;
  }

  // ===================== СТАРТ ПРИЛОЖЕНИЯ =====================
  window.onload = () => {
    renderRoute();
  };
</script>
</body>
</html>
